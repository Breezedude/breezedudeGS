; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32 @ ^6.11.0
framework = arduino
build_type = debug
board_build.filesystem = littlefs
build_flags = 
	-DCORE_DEBUG_LEVEL=5
	-DFW_VERSION=\"0.6.7\"
	-DBREEZEDUDE_GS_ENABLE_LORA_OTA=1
	-DOTA_GS_BACKEND_URL=\"http://fanet.breezedude.de/api/ota/check\"
	-DOTA_GS_FAST_BW_KHZ=500
	-DOTA_GS_FAST_SF=7
	-DOTA_GS_FAST_CR=5
	-DOTA_GS_FAST_PREAMBLE=6
	-DOTA_GS_FAST_SYNCWORD=0x12
    
lib_deps = 
	jgromes/RadioLib@^7.1.1
	paulstoffregen/Time@^1.6.1
	esp32async/ESPAsyncWebServer@^3.7.9
	esp32async/AsyncTCP@^3.4.5
	DNSServer
	bblanchon/ArduinoJson @ ^7.0.0
	chrisjoyce911/esp32FOTA@^0.3.0
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
extra_scripts = ./scripts/tasks.py
	pre:./scripts/install_deps.py
	pre:./scripts/minify.py
	post:./scripts/copy_firmware.py

[env:heltec_wifi_lora_32_V3]
board = heltec_wifi_lora_32_V3
board_build.f_cpu = 80000000L
build_flags =
	${env.build_flags}
	-UARDUINO_USB_MODE
	-UARDUINO_USB_CDC_ON_BOOT
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
upload_port = COM5
monitor_port = COM5


[env:esp32c3_devkitm_1]
board = esp32-c3-devkitm-1
build_type = release
build_unflags =
	-DCORE_DEBUG_LEVEL=5
build_flags =
	${env.build_flags}
	-DCORE_DEBUG_LEVEL=1
